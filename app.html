<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Takia — Карта с построением маршрута</title>

<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; font-family:-apple-system,Roboto,sans-serif; }
  body { display:flex; flex-direction:column; background:#f3f6f4; }

  .head {
    padding:14px 16px; background:#0d4d35; color:#fff;
    font-size:17px; font-weight:700; flex:0 0 auto;
  }
  .head small { display:block; font-weight:400; font-size:12px; opacity:.8; margin-top:2px; }

  #map {
    width:100%;
    height:55vh;
    flex:0 0 auto;
    background:#dfe7e3;
  }

  /* Панель отображения текущего маршрута */
  .route-panel {
    display: none; /* включается только когда есть точки */
    padding: 12px 16px;
    background: #fff;
    border-top: 1px solid #e0e8e3;
    border-bottom: 1px solid #e0e8e3;
    font-size: 13px;
    color: #2c3e50;
    align-items: center;
    justify-content: space-between;
    flex:0 0 auto;
  }
  .route-text {
    font-weight: 500;
    line-height: 1.4;
    padding-right: 10px;
  }
  .btn-clear {
    padding: 6px 12px;
    background: #c0392b;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
    font-weight: bold;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .btn-clear:hover { background: #a93226; }

  /* Стилизация кнопки внутри всплывающего окна карты */
  .popup-btn {
    display: inline-block;
    margin-top: 8px;
    padding: 6px 10px;
    background: #0d4d35;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
    font-weight: 600;
    width: 100%;
    text-align: center;
  }
  .popup-btn:hover { background: #083323; }

  .status {
    padding:10px 16px; font-size:13px; color:#4a5750;
    background:#fff; flex:0 0 auto;
  }
  .status b { color:#0d4d35; }
  .log {
    flex:1 1 auto; overflow-y:auto; padding:10px 16px;
    font-family:monospace; font-size:11px; line-height:1.5; color:#5a6b63;
    background:#fff;
  }
  .log div { padding:2px 0; border-bottom:1px solid #f0f3f1; }
  .ok { color:#166548; } .err { color:#c0392b; } .warn { color:#c75500; }
</style>
</head>
<body>

<div class="head">
  Takia — Интерактивный маршрутизатор
  <small>Нажмите на точку и выберите «Добавить в маршрут» для построения пути.</small>
</div>

<div id="map"></div>

<div class="route-panel" id="routePanel">
  <div class="route-text" id="routePath">Маршрут: не задан</div>
  <button class="btn-clear" onclick="window.clearRoute()">Сбросить путь</button>
</div>

<div class="status" id="status">Подключение к CDN и загрузка Leaflet…</div>
<div class="log" id="log"></div>

<script>
(function(){
  var CDNS = [
    {
      name: 'cdnjs.cloudflare.com',
      css: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css',
      js: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js'
    },
    {
      name: 'cdn.jsdelivr.net',
      css: 'https://cdn.jsdelivr.net/npm/[email protected]/dist/leaflet.css',
      js: 'https://cdn.jsdelivr.net/npm/[email protected]/dist/leaflet.js'
    },
    {
      name: 'unpkg.com',
      css: 'https://unpkg.com/[email protected]/dist/leaflet.css',
      js: 'https://unpkg.com/[email protected]/dist/leaflet.js'
    }
  ];

  function log(msg, cls){
    var el = document.getElementById('log');
    if(!el) return;
    var d = document.createElement('div');
    d.className = cls || ''; d.textContent = '• ' + msg;
    el.appendChild(d);
  }
  window._log = log;

  function tryLoad(i){
    if(typeof L !== 'undefined'){ return; }
    if(i >= CDNS.length){ 
      log('Все источники недоступны — Leaflet не загрузился', 'err');
      document.getElementById('status').innerHTML = '<b style="color:#c0392b">Leaflet не загрузился.</b>';
      return; 
    }
    
    log('Пробую CDN ' + (i + 1) + ': ' + CDNS[i].name);

    var link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = CDNS[i].css;
    document.head.appendChild(link);

    var s = document.createElement('script');
    s.src = CDNS[i].js;
    s.async = false;
    
    s.onload = function(){ 
      log('CDN ' + (i + 1) + ' успешно подключен ✓', 'ok'); 
      start(); 
    };
    
    s.onerror = function(){ 
      log('CDN ' + (i + 1) + ' не ответил, пробую следующий...', 'warn'); 
      if(link.parentNode) link.parentNode.removeChild(link);
      tryLoad(i + 1);
    };
    
    document.head.appendChild(s);
  }
  
  tryLoad(0);
})();
</script>

<script>
// ===== НАШИ ТОЧКИ =====
var HARAM = { lat:21.4225, lng:39.8262, name:'Аль-Харам' };
var POINTS = [
  { name:'Restoran Almaty',        lat:21.4203, lng:39.8267, cat:'Еда',     color:'#e85a4f' },
  { name:'Al-Baik',                lat:21.4218, lng:39.8240, cat:'Фастфуд',  color:'#e85a4f' },
  { name:'Souvenirs Al-Haram',     lat:21.4231, lng:39.8255, cat:'Магазин',  color:'#ff9f43' },
  { name:'Ihram Store Al-Aziziyah',lat:21.4189, lng:39.8301, cat:'Магазин',  color:'#ff9f43' },
  { name:'Al-Shifa Pharmacy',      lat:21.4240, lng:39.8248, cat:'Аптека',   color:'#5b9bf2' },
  { name:'Nahdi Pharmacy',         lat:21.4196, lng:39.8283, cat:'Аптека',   color:'#5b9bf2' },
  { name:'Al-Rajhi Bank Exchange', lat:21.4212, lng:39.8290, cat:'Обмен',    color:'#8e74e8' },
  { name:'Enjaz Exchange',         lat:21.4178, lng:39.8275, cat:'Обмен',    color:'#8e74e8' },
  { name:'Mosque Al-Rajhi',        lat:21.4250, lng:39.8233, cat:'Намаз',    color:'#4ecdc4' },
  { name:'Hera Polyclinic',        lat:21.4228, lng:39.8295, cat:'Медицина', color:'#5b9bf2' }
];

var map, started = false;

// Переменные для хранения данных пути
var routePoints = []; // Сюда сохраняем координаты [lat, lng]
var routeNames = [];  // Сюда сохраняем имена для текстовой панели
var routePolyline = null; // Объект линии на карте

function start(){
  if(started) return; started=true;
  var log = window._log;
  var status = document.getElementById('status');

  var mapEl = document.getElementById('map');
  function setH(){
    var h = Math.round(window.innerHeight * 0.55);
    mapEl.style.height = h + 'px';
  }
  setH();

  log('Инициализация карты…');
  map = L.map('map', { zoomControl:true }).setView([HARAM.lat, HARAM.lng], 15);

  var tiles = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap',
    crossOrigin: true
  });

  var loaded=0, errors=0;
  tiles.on('tileload', function(){ loaded++; status.innerHTML='Тайлов загружено: <b>'+loaded+'</b>'+(errors?(' · ошибок: '+errors):''); });
  tiles.on('tileerror', function(){ errors++; });
  tiles.on('load', function(){ log('Все тайлы отрисованы ✓','ok'); });
  tiles.addTo(map);

  // Функция добавления точки в массив пути
  window.addToRoute = function(lat, lng, name) {
    routePoints.push([lat, lng]);
    routeNames.push(name);

    // Если линия уже создана — обновляем её координаты, если нет — создаем с нуля
    if(routePolyline) {
      routePolyline.setLatLngs(routePoints);
    } else {
      routePolyline = L.polyline(routePoints, {
        color: '#2980b9',      // Синий цвет линии
        weight: 5,             // Толщина линии
        opacity: 0.85,         // Прозрачность
        dashArray: '8, 8',     // Сделаем её пунктирной для красоты
        lineJoin: 'round'
      }).addTo(map);
    }

    // Обновляем текстовую панель под картой
    document.getElementById('routePanel').style.display = 'flex';
    document.getElementById('routePath').innerHTML = '<b>Путь:</b> ' + routeNames.join(' → ');
    
    // Закрываем балун после клика, чтобы не мешал обзору
    map.closePopup();
    log('В маршрут добавлено: ' + name, 'ok');
  };

  // Функция полной очистки пути
  window.clearRoute = function() {
    routePoints = [];
    routeNames = [];
    if(routePolyline) {
      map.removeLayer(routePolyline);
      routePolyline = null;
    }
    document.getElementById('routePanel').style.display = 'none';
    log('Маршрут полностью сброшен');
  };

  // Создание содержимого балуна с кнопкой «Добавить в маршрут»
  function createPopupContent(name, info, lat, lng) {
    var container = document.createElement('div');
    container.innerHTML = '<b>' + name + '</b>' + (info ? '<br>' + info : '');
    
    var btn = document.createElement('button');
    btn.className = 'popup-btn';
    btn.textContent = 'Добавить в маршрут';
    btn.onclick = function() {
      window.addToRoute(lat, lng, name);
    };
    
    container.appendChild(btn);
    return container;
  }

  // Главный маркер Харама
  var haramPopup = createPopupContent(HARAM.name, 'Главная мечеть', HARAM.lat, HARAM.lng);
  L.marker([HARAM.lat, HARAM.lng]).addTo(map).bindPopup(haramPopup);

  // Отрисовка остальных цветных точек
  POINTS.forEach(function(p){
    var pPopup = createPopupContent(p.name, p.cat, p.lat, p.lng);
    L.circleMarker([p.lat, p.lng], {
      radius:10, color:'#fff', weight:2, fillColor:p.color, fillOpacity:1
    }).addTo(map).bindPopup(pPopup);
  });
  
  log('Добавлено точек на карту: ' + POINTS.length + ' ✓', 'ok');

  // Автоматический фокус на все точки сразу
  var all = POINTS.map(function(p){return [p.lat,p.lng];});
  all.push([HARAM.lat, HARAM.lng]);
  map.fitBounds(all, { padding:[40,40], maxZoom:16 });

  // Исправление багов сетки при изменении размеров экрана
  function fix(){ if(map){ map.invalidateSize(true); } }
  setTimeout(fix, 100); setTimeout(fix, 500);
  window.addEventListener('resize', function(){ setH(); fix(); });
  if(window.ResizeObserver){ new ResizeObserver(fix).observe(mapEl); }
}
</script>

</body>
</html>
